name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Install Dalamud development files
        shell: pwsh
        run: |
          Invoke-WebRequest https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"
      - name: Run parser tests
        run: dotnet run --project tests/EasySocialMediaPlugin.ParserTests -c Release
      - name: Build plugin
        run: dotnet build EasySocialMediaPlugin.sln -c Release
      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create $env:GITHUB_REF_NAME "EasySocialMediaPlugin/bin/x64/Release/EasySocialMediaPlugin/latest.zip" --title "Easy Social Media Plugin $env:GITHUB_REF_NAME" --generate-notes
